<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Help Desk Inteligente | Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav>
    <span class="logo">⛅ Help Desk Inteligente</span>
    <a href="index.html">Crear ticket</a>
    <a href="admin.html">Panel de agentes</a>
    <a href="dashboard.html" class="activo">Dashboard</a>
  </nav>

  <main>
    <h1>Dashboard de métricas</h1>
    <p class="subtitulo">Resumen en tiempo real de los tickets del sistema.</p>

    <div class="metricas" id="metricas"></div>

    <div class="panel">
      <h3 style="margin-bottom:14px">Tickets por prioridad</h3>
      <div id="porPrioridad"><p class="vacio">Cargando...</p></div>
    </div>

    <div class="panel">
      <h3 style="margin-bottom:14px">Tickets por categoría</h3>
      <div id="porCategoria"><p class="vacio">Cargando...</p></div>
    </div>
  </main>

  <script>
    function contar(lista, campo) {
      const conteo = {};
      for (const item of lista) {
        const valor = item[campo] || "sin clasificar";
        conteo[valor] = (conteo[valor] || 0) + 1;
      }
      return conteo;
    }

    function barras(conteo, total) {
      const entradas = Object.entries(conteo).sort((a, b) => b[1] - a[1]);
      if (!entradas.length) return '<p class="vacio">Sin datos todavía</p>';
      let html = "";
      for (const [nombre, cantidad] of entradas) {
        const pct = Math.round((cantidad / total) * 100);
        html += `<div class="barra-fila">
          <span class="nombre">${nombre}</span>
          <div class="barra-fondo"><div class="barra-relleno" style="width:${pct}%"></div></div>
          <span>${cantidad}</span>
        </div>`;
      }
      return html;
    }

    async function cargar() {
      try {
        const res = await fetch("/api/tickets");
        const tickets = await res.json();

        const abiertos = tickets.filter((t) => t.estado === "abierto").length;
        const cerrados = tickets.filter((t) => t.estado === "cerrado").length;
        const escalados = tickets.filter((t) => t.escalado).length;
        const automaticos = tickets.filter((t) => t.respuesta_automatica).length;

        document.getElementById("metricas").innerHTML = `
          <div class="metrica"><div class="numero">${tickets.length}</div><div class="etiqueta">Tickets totales</div></div>
          <div class="metrica"><div class="numero">${abiertos}</div><div class="etiqueta">Abiertos</div></div>
          <div class="metrica"><div class="numero">${cerrados}</div><div class="etiqueta">Cerrados</div></div>
          <div class="metrica"><div class="numero">${escalados}</div><div class="etiqueta">Escalados a Trello</div></div>
          <div class="metrica"><div class="numero">${automaticos}</div><div class="etiqueta">Resueltos por la IA</div></div>
        `;

        document.getElementById("porPrioridad").innerHTML = barras(
          contar(tickets, "prioridad"),
          tickets.length || 1
        );
        document.getElementById("porCategoria").innerHTML = barras(
          contar(tickets, "categoria"),
          tickets.length || 1
        );
      } catch (e) {
        document.getElementById("porPrioridad").innerHTML =
          `<p class="vacio">Error: ${e.message}</p>`;
      }
    }

    cargar();
  </script>
</body>
</html>
