<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Help Desk Inteligente | Crear Ticket</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav>
    <span class="logo">⛅ Help Desk Inteligente</span>
    <a href="index.html" class="activo">Crear ticket</a>
    <a href="admin.html">Panel de agentes</a>
    <a href="dashboard.html">Dashboard</a>
  </nav>

  <main>
    <h1>Crear un ticket de soporte</h1>
    <p class="subtitulo">
      Describe tu problema. Nuestro agente de IA lo clasificará automáticamente
      y lo enviará al equipo correcto.
    </p>

    <div class="panel">
      <form id="formulario">
        <label for="titulo">Título del problema *</label>
        <input id="titulo" type="text" placeholder="Ej: No puedo acceder al sistema" required />

        <label for="descripcion">Descripción *</label>
        <textarea id="descripcion" placeholder="Cuéntanos qué pasa con el mayor detalle posible..." required></textarea>

        <label for="prioridad">¿Qué tan urgente lo consideras?</label>
        <select id="prioridad">
          <option value="baja">Baja</option>
          <option value="normal" selected>Normal</option>
          <option value="alta">Alta</option>
          <option value="urgente">Urgente</option>
        </select>

        <label for="email">Tu correo *</label>
        <input id="email" type="email" placeholder="tu@correo.com" required />

        <button type="submit" id="boton">🚀 Enviar ticket</button>
      </form>

      <div id="resultado" class="panel"></div>
    </div>
  </main>

  <script>
    const form = document.getElementById("formulario");
    const boton = document.getElementById("boton");
    const resultado = document.getElementById("resultado");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      boton.disabled = true;
      boton.textContent = "🤖 El agente de IA está analizando tu ticket...";
      resultado.className = "";
      resultado.style.display = "none";

      try {
        const res = await fetch("/api/tickets", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            titulo: document.getElementById("titulo").value,
            descripcion: document.getElementById("descripcion").value,
            prioridad: document.getElementById("prioridad").value,
            email: document.getElementById("email").value,
          }),
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Error del servidor");

        let html = "<h3>✅ ¡Ticket creado exitosamente!</h3>";
        html += `<p><strong>ID:</strong> ${data.ticket._id}</p>`;

        if (data.agente) {
          html += `<p><strong>Prioridad asignada por la IA:</strong> <span class="badge ${data.agente.prioridad}">${data.agente.prioridad}</span></p>`;
          html += `<p><strong>Categoría:</strong> ${data.agente.categoria}</p>`;
          html += `<p><strong>Equipo asignado:</strong> ${data.agente.equipo}</p>`;

          if (data.agente.es_pregunta_frecuente && data.agente.respuesta_automatica) {
            html += `<p><strong>🤖 Respuesta automática del agente:</strong><br>${data.agente.respuesta_automatica}</p>`;
            html += `<p>El ticket se cerró automáticamente porque el agente pudo resolverlo.</p>`;
          }

          if (data.trello) {
            html += `<p><strong>🚨 Ticket escalado.</strong> Se creó una tarjeta en Trello: <a href="${data.trello}" target="_blank">${data.trello}</a></p>`;
          }
        } else if (data.error_agente) {
          html += `<p>⚠️ El ticket se guardó pero el agente de IA tuvo un problema: ${data.error_agente}</p>`;
        }

        resultado.innerHTML = html;
        resultado.className = "ok";
        form.reset();
      } catch (err) {
        resultado.innerHTML = `<h3>❌ Ocurrió un error</h3><p>${err.message}</p>`;
        resultado.className = "error";
      }

      boton.disabled = false;
      boton.textContent = "🚀 Enviar ticket";
    });
  </script>
</body>
</html>
