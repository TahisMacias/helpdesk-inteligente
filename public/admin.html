<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Help Desk Inteligente | Panel de agentes</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav>
    <span class="logo">
      <svg class="ico" viewBox="0 0 24 24"><path d="M17.5 19a4.5 4.5 0 1 0 0-9h-1.13A7 7 0 1 0 5 17.89"/><path d="M12 12v9"/><path d="m8 17 4 4 4-4"/></svg>
      Help Desk Inteligente
    </span>
    <a href="index.html">Crear ticket</a>
    <a href="admin.html" class="activo">Panel de agentes</a>
    <a href="dashboard.html">Dashboard</a>
  </nav>

  <main>
    <span class="eyebrow">Vista interna del equipo</span>
    <h1>Panel de agentes</h1>
    <p class="subtitulo">Todos los tickets guardados en MongoDB Atlas, clasificados automáticamente por el agente de IA.</p>

    <div class="panel">
      <button class="secundario" onclick="cargar()">
        <svg class="ico" viewBox="0 0 24 24" style="width:14px;height:14px"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>
        Actualizar
      </button>
      <div class="tabla-scroll">
        <div id="contenido"><p class="vacio">Cargando tickets...</p></div>
      </div>
    </div>
  </main>

  <footer>Help Desk Inteligente · Proyecto Cloud Computing · CENESTUR 2026</footer>

  <script>
    const icons = {
      bot: '<svg class="ico" viewBox="0 0 24 24" style="width:14px;height:14px"><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></svg>',
      mail: '<svg class="ico" viewBox="0 0 24 24" style="width:13px;height:13px"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>',
      trello: '<svg class="ico" viewBox="0 0 24 24" style="width:13px;height:13px"><rect width="18" height="18" x="3" y="3" rx="2"/><rect width="3" height="9" x="7" y="7"/><rect width="3" height="5" x="14" y="7"/></svg>',
      external: '<svg class="ico" viewBox="0 0 24 24" style="width:12px;height:12px"><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></svg>',
      check: '<svg class="ico" viewBox="0 0 24 24" style="width:14px;height:14px"><path d="M20 6 9 17l-5-5"/></svg>',
      trash: '<svg class="ico" viewBox="0 0 24 24" style="width:14px;height:14px"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>',
    };

    async function cargar() {
      const cont = document.getElementById("contenido");
      cont.innerHTML = '<p class="vacio">Cargando tickets...</p>';

      try {
        const res = await fetch("/api/tickets");
        const tickets = await res.json();

        if (!tickets.length) {
          cont.innerHTML = '<p class="vacio">Todavía no hay tickets. Crea el primero desde la página principal.</p>';
          return;
        }

        let html = `<table>
          <tr>
            <th>Ticket</th>
            <th>Prioridad IA</th>
            <th>Categoría</th>
            <th>Equipo</th>
            <th>Estado</th>
            <th>Acciones</th>
          </tr>`;

        for (const t of tickets) {
          const prioridad = t.prioridad
            ? `<span class="badge ${t.prioridad}">${t.prioridad}</span>`
            : '<span style="color:var(--texto-suave)">sin clasificar</span>';

          const trello = t.trello
            ? `<div style="margin-top:8px"><a href="${t.trello}" target="_blank">${icons.trello} Ver tarjeta en Trello ${icons.external}</a></div>`
            : "";

          const respuesta = t.respuesta_automatica
            ? `<div class="respuesta-ia">${icons.bot} ${t.respuesta_automatica}</div>`
            : "";

          html += `<tr>
            <td>
              <div class="titulo-t">${t.titulo}</div>
              <div class="desc">${t.descripcion}</div>
              <div class="desc">${icons.mail} ${t.email}</div>
              ${respuesta}
              ${trello}
            </td>
            <td>${prioridad}</td>
            <td>${t.categoria || "—"}</td>
            <td>${t.equipo || "—"}</td>
            <td><span class="badge ${t.estado}">${t.estado}</span></td>
            <td>
              ${t.estado === "abierto"
                ? `<button class="secundario" onclick="cerrar('${t._id}')">${icons.check} Cerrar</button><div style="height:8px"></div>`
                : ""}
              <button class="peligro" onclick="eliminar('${t._id}')">${icons.trash} Eliminar</button>
            </td>
          </tr>`;
        }

        html += "</table>";
        cont.innerHTML = html;
      } catch (e) {
        cont.innerHTML = `<p class="vacio">Error cargando tickets: ${e.message}</p>`;
      }
    }

    // ------ Autenticacion simple del panel ------
    // La clave se pide una sola vez y se guarda mientras la
    // pestana este abierta (sessionStorage)
    function claveAdmin(forzar) {
      let clave = sessionStorage.getItem("adminKey");
      if (!clave || forzar) {
        clave = prompt("Clave de administrador:");
        if (clave) sessionStorage.setItem("adminKey", clave);
      }
      return clave;
    }

    async function accionAdmin(url, opciones) {
      const clave = claveAdmin(false);
      if (!clave) return alert("Se necesita la clave de administrador.");
      opciones.headers = Object.assign({}, opciones.headers, { "x-admin-key": clave });
      const res = await fetch(url, opciones);
      if (res.status === 401) {
        sessionStorage.removeItem("adminKey");
        alert("Clave incorrecta. Intenta de nuevo.");
        return;
      }
      cargar();
    }

    async function cerrar(id) {
      await accionAdmin("/api/tickets/" + id, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ estado: "cerrado" }),
      });
    }

    async function eliminar(id) {
      if (!confirm("¿Seguro que quieres eliminar este ticket?")) return;
      await accionAdmin("/api/tickets/" + id, { method: "DELETE" });
    }

    cargar();
  </script>
</body>
</html>
